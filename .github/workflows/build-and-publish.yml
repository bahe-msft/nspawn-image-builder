name: Build and Publish nspawn Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'BENCHMARKS.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: git SHA short)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap systemd-container zstd

      - name: Install ORAS
        run: |
          ORAS_VERSION="1.2.2"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Build image
        run: sudo ./build.sh

      - name: Validate image
        run: sudo ./validate.sh

      - name: Upload image as GitHub Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: nspawn-image
          path: images/*.tar.zst
          retention-days: 30
          compression-level: 0  # already zstd-compressed

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Push with SHA tag
          ./ghcr-push.sh --tag "${{ steps.tag.outputs.tag }}"
          # Also tag as latest
          ./ghcr-push.sh --tag latest

  publish-release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nspawn-image
          path: images/

      - name: Summary
        run: |
          echo "## nspawn Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          for f in images/*.tar.zst; do
            SIZE=$(du -h "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| **Image** | \`${NAME}\` (${SIZE}) |" >> $GITHUB_STEP_SUMMARY
          done
          source config.env
          echo "| **Registry** | \`ghcr.io/${{ github.repository }}/${IMAGE_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "GHCR_TOKEN=\$TOKEN ./ghcr-pull.sh --extract" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
