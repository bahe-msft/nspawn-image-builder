name: Build and Publish nspawn Images

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'BENCHMARKS.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (leave empty for all)'
        required: false
        default: ''
      image_tag:
        description: 'Image tag (default: git SHA short)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.list.outputs.variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover variants
        id: list
        run: |
          INPUT_VARIANT="${{ github.event.inputs.variant }}"
          if [[ -n "${INPUT_VARIANT}" ]]; then
            # Build only the requested variant
            echo "variants=[\"${INPUT_VARIANT}\"]" >> "$GITHUB_OUTPUT"
          else
            # Build all variants
            VARIANTS=$(ls variants/*.conf 2>/dev/null | xargs -I{} basename {} .conf | jq -R . | jq -sc .)
            echo "variants=${VARIANTS}" >> "$GITHUB_OUTPUT"
          fi
          echo "Variants to build: $(cat $GITHUB_OUTPUT)"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.discover.outputs.variants) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap systemd-container zstd

      - name: Install ORAS
        run: |
          ORAS_VERSION="1.2.2"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Build image (${{ matrix.variant }})
        run: sudo ./build.sh --variant ${{ matrix.variant }}

      - name: Validate image (${{ matrix.variant }})
        run: sudo ./validate.sh --variant ${{ matrix.variant }}

      - name: Run tests (${{ matrix.variant }})
        run: sudo ./tests/run-tests.sh --variant ${{ matrix.variant }}

      - name: Get image name
        id: meta
        run: |
          source variants/${{ matrix.variant }}.conf
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nspawn-${{ matrix.variant }}
          path: images/${{ steps.meta.outputs.image_name }}.tar.zst
          retention-days: 30
          compression-level: 0

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source variants/${{ matrix.variant }}.conf
          export IMAGE_NAME
          # Push with SHA tag
          ./ghcr-push.sh --tag "${{ steps.tag.outputs.tag }}"
          # Also tag as latest
          ./ghcr-push.sh --tag latest

  summary:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Summary
        run: |
          echo "## nspawn Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Image | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/nspawn-*/; do
            [[ -d "$dir" ]] || continue
            VARIANT=$(basename "$dir" | sed 's/^nspawn-//')
            for f in "${dir}"*.tar.zst; do
              [[ -f "$f" ]] || continue
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| ${VARIANT} | \`${NAME}\` | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
            done
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
