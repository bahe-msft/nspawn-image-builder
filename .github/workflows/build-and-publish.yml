name: Build and Publish nspawn Images

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'BENCHMARKS.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (leave empty for all)'
        required: false
        default: ''
      arch:
        description: 'Architecture to build (amd64, arm64, or leave empty for both)'
        required: false
        default: ''
      image_tag:
        description: 'Image tag (default: git SHA short)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover build matrix
        id: list
        run: |
          INPUT_VARIANT="${{ github.event.inputs.variant }}"
          INPUT_ARCH="${{ github.event.inputs.arch }}"
          
          # Determine variants
          if [[ -n "${INPUT_VARIANT}" ]]; then
            VARIANTS="[\"${INPUT_VARIANT}\"]"
          else
            VARIANTS=$(ls variants/*.conf 2>/dev/null | xargs -I{} basename {} .conf | jq -R . | jq -sc .)
          fi
          
          # Determine architectures
          if [[ -n "${INPUT_ARCH}" ]]; then
            ARCHS="[\"${INPUT_ARCH}\"]"
          else
            ARCHS='["amd64","arm64"]'
          fi
          
          # Create matrix (compact JSON on single line)
          MATRIX=$(jq -n -c --argjson variants "${VARIANTS}" --argjson archs "${ARCHS}" \
            '{include: [$variants[] as $v | $archs[] as $a | {variant: $v, arch: $a}]}')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix:"
          echo "${MATRIX}" | jq .

  build:
    needs: discover
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap systemd-container zstd

      - name: Install ORAS
        run: |
          ORAS_VERSION="1.2.2"
          # Detect architecture for ORAS binary
          ARCH=$(uname -m)
          if [[ "$ARCH" == "x86_64" ]]; then
            ORAS_ARCH="amd64"
          elif [[ "$ARCH" == "aarch64" ]]; then
            ORAS_ARCH="arm64"
          else
            echo "Unsupported architecture: $ARCH" >&2
            exit 1
          fi
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_${ORAS_ARCH}.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Build image (${{ matrix.variant }} / ${{ matrix.arch }})
        run: sudo ./build.sh --variant ${{ matrix.variant }} --arch ${{ matrix.arch }}

      - name: Validate image (${{ matrix.variant }} / ${{ matrix.arch }})
        run: sudo ./validate.sh --variant ${{ matrix.variant }} --arch ${{ matrix.arch }}

      - name: Run tests (${{ matrix.variant }} / ${{ matrix.arch }})
        run: sudo ./tests/run-tests.sh --variant ${{ matrix.variant }} --arch ${{ matrix.arch }}

      - name: Get image name
        id: meta
        run: |
          source variants/${{ matrix.variant }}.conf
          # Append architecture suffix for non-amd64
          if [[ "${{ matrix.arch }}" != "amd64" ]]; then
            IMAGE_NAME="${IMAGE_NAME}-${{ matrix.arch }}"
          fi
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nspawn-${{ matrix.variant }}-${{ matrix.arch }}
          path: images/${{ steps.meta.outputs.image_name }}.tar.zst
          retention-days: 30
          compression-level: 0

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source variants/${{ matrix.variant }}.conf
          # Append architecture suffix for non-amd64
          if [[ "${{ matrix.arch }}" != "amd64" ]]; then
            IMAGE_NAME="${IMAGE_NAME}-${{ matrix.arch }}"
          fi
          export IMAGE_NAME
          # Push with SHA tag
          ./ghcr-push.sh --tag "${{ steps.tag.outputs.tag }}"
          # Also tag as latest
          ./ghcr-push.sh --tag latest

  summary:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Summary
        run: |
          echo "## nspawn Images Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Image | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/nspawn-*/; do
            [[ -d "$dir" ]] || continue
            VARIANT=$(basename "$dir" | sed 's/^nspawn-//')
            for f in "${dir}"*.tar.zst; do
              [[ -f "$f" ]] || continue
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| ${VARIANT} | \`${NAME}\` | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
            done
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
